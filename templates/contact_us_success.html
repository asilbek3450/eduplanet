{% extends 'base.html' %}

{% block content %}
<section class="mx-auto max-w-5xl px-4 py-20 sm:px-6 lg:px-8">
  <div class="overflow-hidden rounded-[2rem] bg-gradient-to-br from-sky-600 to-slate-950 p-10 text-white shadow-glow lg:p-14">
    <p class="text-sm font-semibold uppercase tracking-[0.28em] text-sky-200">{{ ui.contact }}</p>
    <h1 class="mt-4 text-4xl font-extrabold leading-tight">{{ ui.contact_success_title }}</h1>
    <p class="mt-5 max-w-2xl text-base leading-8 text-sky-50">{{ ui.contact_success_description }}</p>
    <div class="mt-8 flex flex-col gap-4 sm:flex-row">
      <a href="{{ home_url }}#courses" class="inline-flex items-center justify-center rounded-2xl bg-white px-6 py-4 text-sm font-semibold text-slate-950 transition hover:bg-slate-100">Kurslarni ko'rish</a>
      <a href="{{ home_url }}#blog" class="inline-flex items-center justify-center rounded-2xl border border-white/30 px-6 py-4 text-sm font-semibold text-white transition hover:bg-white/10">Blogni o'qish</a>
    </div>
  </div>
</section>
{% endblock %}
